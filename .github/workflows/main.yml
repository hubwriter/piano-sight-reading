name: Daily summary
on:
  workflow_dispatch:
  # Daily at 8:25 UTC
  schedule:
    - cron: '25 8 * * *'
permissions:
  contents: read
jobs:
  daily-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          FILE=/CODE-CHANGES.md
          copilot -p "Review the git log for this repository and write a bullet point summary of all code changes that were made yesterday. Include a brief description of what was changed. Prepend the description to $FILE (creating the file if necessary) and delete the oldest descriptions if the file contains more than 5." --allow-tool "bash(git *)" --no-ask-user -s
